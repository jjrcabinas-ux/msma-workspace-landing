<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSMA Workspace</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="theme-color" content="#070D17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070D17;
  --bg-soft:#0B1424;
  --card:#0E1929;
  --card-2:#0A1420;
  --line:rgba(163,197,255,.10);
  --line-strong:rgba(163,197,255,.18);
  --white:#F4F7FB;
  --grey:#93A3B8;
  --dim:#5C6B80;
  --lime:#A3E635;
  --lime-soft:rgba(163,230,53,.14);
  --red:#F87171;
  --amber:#FBBF24;
  --blue:#60A5FA;
}
*{margin:0;padding:0;box-sizing:border-box}
[hidden]{display:none !important}
html,body{height:100%}
body{
  background:var(--bg);color:var(--white);
  font-family:'Utendo','IBM Plex Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ---------- loading / gate ---------- */
#gate{
  position:fixed;inset:0;background:var(--bg);z-index:50;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
#gate img{height:44px}
#gate .msg{color:var(--grey);font-size:.85rem}

/* ---------- top bar ---------- */
.topbar{
  height:52px;display:flex;align-items:center;gap:14px;padding:0 14px;
  border-bottom:1px solid var(--line);background:var(--bg-soft);
}
.tb-brand{display:flex;align-items:flex-end;gap:8px;font-weight:700;font-size:.95rem;letter-spacing:-.02em;white-space:nowrap;line-height:1.05}
.tb-brand img{height:24px;width:auto;display:block}
.tb-search{
  flex:1;max-width:520px;margin:0 auto;display:flex;align-items:center;gap:8px;
  background:var(--card-2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;color:var(--dim);
}
.tb-search input{flex:1;background:none;border:none;outline:none;color:var(--white);font-family:inherit;font-size:.85rem}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.tb-icon{
  width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--grey);font-size:1rem;
}
.tb-icon:hover{background:var(--card);color:var(--white)}
.avatar{
  width:32px;height:32px;border-radius:50%;background:var(--lime);color:#0A1628;
  font-weight:700;font-size:.78rem;display:grid;place-items:center;cursor:pointer;
}
.avatar-menu{
  position:absolute;top:48px;right:12px;background:var(--card);border:1px solid var(--line-strong);
  border-radius:12px;padding:8px;min-width:210px;z-index:40;box-shadow:0 18px 50px rgba(0,0,0,.5);
}
.avatar-menu .who{padding:8px 10px;border-bottom:1px solid var(--line);margin-bottom:6px}
.avatar-menu .who b{display:block;font-size:.82rem}
.avatar-menu .who span{font-size:.72rem;color:var(--grey);word-break:break-all}
.avatar-menu button{
  width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:.82rem;color:var(--grey);
}
.avatar-menu button:hover{background:var(--card-2);color:var(--white)}

/* ---------- layout ---------- */
.shell{display:flex;height:calc(100vh - 52px)}
.sidebar{
  width:250px;min-width:250px;border-right:1px solid var(--line);background:var(--bg-soft);
  padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;
  transition:margin-left .2s ease;
}
.sb-label{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:12px 10px 6px}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  color:var(--grey);font-size:.95rem;font-weight:500;cursor:pointer;width:100%;text-align:left;
}
.sb-item:hover{background:var(--card);color:var(--white)}
.sb-item.active{background:var(--lime-soft);color:var(--lime);font-weight:600}
.sb-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--line)}

/* ---------- main / board ---------- */
.main{flex:1;overflow-y:auto;padding:22px 26px 60px}
.board-head h1{font-size:1.35rem;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.board-head .desc{color:var(--grey);font-size:.82rem;margin-top:2px}
.board-tabs{display:flex;gap:2px;margin:16px 0 0;border-bottom:1px solid var(--line)}
.btab{
  padding:8px 14px;font-size:.82rem;color:var(--grey);border-bottom:2px solid transparent;cursor:pointer;
}
.btab.on{color:var(--white);border-bottom-color:var(--lime)}
.btab.off{opacity:.45;cursor:not-allowed}
.toolbar{display:flex;align-items:center;gap:10px;margin:16px 0 20px;flex-wrap:wrap}
.tool-new{
  background:var(--lime);color:#0A1628;font-weight:700;font-size:.84rem;
  border-radius:8px;padding:8px 16px;
}
.tool-new:hover{filter:brightness(1.06)}
.tool{
  display:flex;align-items:center;gap:6px;color:var(--grey);font-size:.82rem;
  padding:8px 10px;border-radius:8px;
}
.tool:hover{background:var(--card);color:var(--white)}
.tool input{background:none;border:none;outline:none;color:var(--white);font-family:inherit;font-size:.82rem;width:130px}

/* group */
.group{margin-bottom:30px}
.group-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;user-select:none}
.group-head .caret{color:var(--grey);font-size:.7rem;transition:transform .15s}
.group.closed .caret{transform:rotate(-90deg)}
.group-title{font-weight:700;font-size:.95rem}
.group-count{color:var(--dim);font-size:.76rem}
.gtable{
  border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card-2);
  border-left:4px solid var(--gcolor,var(--lime));
}
.group.closed .gtable{display:none}
.grow{
  display:grid;grid-template-columns:minmax(220px,1fr) 150px 150px 120px;
  border-bottom:1px solid var(--line);align-items:stretch;
}
.grow:last-child{border-bottom:none}
.grow>div{padding:10px 14px;display:flex;align-items:center;gap:8px;min-width:0}
.grow.head{background:rgba(255,255,255,.02);color:var(--dim);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
.grow.item:hover{background:rgba(163,197,255,.04)}
.grow .name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grow .form-chip{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--lime);background:var(--lime-soft);border-radius:5px;padding:2px 7px;flex:none}
.person{display:flex;align-items:center;gap:7px;font-size:.8rem;color:var(--grey);overflow:hidden}
.pava{
  width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-size:.62rem;font-weight:700;color:#0A1628;background:var(--blue);
}
.status{
  flex:1;align-self:stretch;display:flex;align-items:center;justify-content:center;
  font-size:.74rem;font-weight:700;border-radius:7px;color:#0A1628;cursor:pointer;
  min-height:30px;text-align:center;padding:2px 6px;
}
.status[data-s="done"]{background:var(--lime)}
.status[data-s="working"]{background:var(--amber)}
.status[data-s="stuck"]{background:var(--red)}
.status[data-s="review"]{background:var(--blue)}
.due{font-family:'IBM Plex Mono',monospace;font-size:.74rem;color:var(--grey)}
.due.late{color:var(--red)}
.addrow{padding:9px 14px;color:var(--dim);font-size:.8rem;cursor:pointer;display:flex;gap:8px;align-items:center}
.addrow:hover{color:var(--white);background:rgba(163,197,255,.03)}
.addrow input{
  background:none;border:none;outline:none;color:var(--white);font-family:inherit;font-size:.82rem;flex:1;
}

/* members */
.mem-input{
  background:var(--card-2);border:1px solid var(--line-strong);border-radius:8px;
  padding:8px 10px;color:var(--white);font-family:inherit;font-size:.84rem;
}
.mem-input:focus{outline:2px solid var(--lime);outline-offset:1px}
#mem-email{min-width:240px}
.mem-del{color:var(--red);font-size:.8rem}
.mem-del:hover{text-decoration:underline}
.mem-error{
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);
  font-size:.78rem;border-radius:8px;padding:9px 12px;margin:0 0 16px;max-width:520px;
}

/* username prompt */
.uname-overlay{
  position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
  background:rgba(4,7,13,.72);backdrop-filter:blur(5px);padding:20px;
}
.uname-overlay[hidden]{display:none}
.uname-card{
  width:100%;max-width:380px;background:var(--card);border:1px solid var(--line-strong);
  border-radius:16px;padding:26px 24px;box-shadow:0 30px 90px rgba(0,0,0,.6);
}
.uname-card h3{font-size:1.05rem;letter-spacing:-.02em}
.uname-card p{color:var(--grey);font-size:.8rem;margin:6px 0 16px}
.uname-card .mem-input{width:100%}
.uname-actions{display:flex;gap:10px;margin-top:16px}
.uname-actions .tool-new{flex:1;text-align:center}
.uname-skip{color:var(--dim);font-size:.8rem;padding:8px 12px}
.uname-skip:hover{color:var(--white)}

/* coming soon board */
.soonboard{
  border:1px dashed var(--line-strong);border-radius:14px;padding:60px 30px;text-align:center;color:var(--grey);
}
.soonboard b{display:block;color:var(--white);font-size:1.05rem;margin-bottom:6px}
.soonboard a{color:var(--lime);text-decoration:underline}

/* mobile */
.tb-burger{display:none}
@media(max-width:820px){
  .tb-burger{display:grid}
  .sidebar{
    position:fixed;top:52px;bottom:0;left:0;z-index:30;margin-left:-260px;box-shadow:20px 0 60px rgba(0,0,0,.5);
  }
  .sidebar.open{margin-left:0}
  .grow{grid-template-columns:minmax(150px,1fr) 110px 100px}
  .grow>div:nth-child(2){display:none}
  .grow.head>div:nth-child(2){display:none}
  .main{padding:16px 14px 60px}
  .tb-search{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>

<div class="uname-overlay" id="uname-overlay" hidden>
  <div class="uname-card" role="dialog" aria-modal="true" aria-labelledby="uname-title">
    <h3 id="uname-title">Choose your username</h3>
    <p>Your account doesn’t have a username yet. Pick one to use for signing in (you can always use your email too).</p>
    <input class="mem-input" id="uname-input" type="text" autocomplete="off" spellcheck="false" maxlength="20" placeholder="e.g. jcabs">
    <div class="mem-error" id="uname-error" role="alert" hidden style="margin:12px 0 0"></div>
    <div class="uname-actions">
      <button class="tool-new" id="uname-save">Save username</button>
      <button class="uname-skip" id="uname-skip">Later</button>
    </div>
  </div>
</div>

<div id="gate">
  <img src="/logo.png" alt="MSMA logo">
  <div class="msg">Loading your workspace…</div>
</div>

<header class="topbar">
  <button class="tb-icon tb-burger" id="burger" aria-label="Toggle sidebar">☰</button>
  <a class="tb-brand" href="/"><img src="/logo.png" alt="MSMA logo"> MSMA Workspace</a>
  <div class="tb-search">🔍 <input id="global-search" type="search" placeholder="Search items…" aria-label="Search items"></div>
  <div class="tb-right">
    <button class="tb-icon" title="Notifications" aria-label="Notifications">🔔</button>
    <button class="avatar" id="avatar" aria-label="Account menu">–</button>
  </div>
  <div class="avatar-menu" id="avatar-menu" hidden>
    <div class="who"><b id="who-name">…</b><span id="who-email"></span></div>
    <button id="signout">Sign out</button>
  </div>
</header>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <button class="sb-item" data-board="dashboard">Dashboard</button>
    <button class="sb-item" data-board="tasks">Employee Task Monitoring</button>
    <button class="sb-item" data-board="tax">Tax Compliance System</button>
    <button class="sb-item" data-board="audit">Audit</button>
    <button class="sb-item" data-board="books">Bookkeeping</button>
    <button class="sb-item" data-board="clients">Client Masterlist</button>
    <button class="sb-item" id="sb-members" data-board="members" hidden>Members</button>
    <div class="sb-foot">
      <button class="sb-item" data-board="settings">⚙ Settings</button>
    </div>
  </nav>

  <main class="main" id="main"></main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
/* ---------- auth gate ---------- */
firebase.initializeApp({
  apiKey: 'AIzaSyBlXYkyP0bcHEsbU8bhYWnr9kvFluiP0f0',
  authDomain: 'msma-workspace.firebaseapp.com',
  projectId: 'msma-workspace',
  appId: '1:33439738161:web:a3f3ab244bd17f4cc9e810'
});
var ADMIN_EMAILS = ['jjrcabinas@gmail.com'];
var IS_ADMIN = false;
firebase.auth().onAuthStateChanged(function(user){
  if (!user) { window.location.replace('/'); return; }
  var em = (user.email || '').toLowerCase();
  if (ADMIN_EMAILS.indexOf(em) !== -1) { enter(user); return; }
  firebase.firestore().collection('members').doc(em).get().then(function(doc){
    if (doc.exists) enter(user);
    else { firebase.auth().signOut(); window.location.replace('/'); }
  }).catch(function(){ window.location.replace('/'); });
});
function enter(user){
  var gate = document.getElementById('gate');
  if (gate) gate.remove();
  startSync();
  var email = user.email || '';
  var name = user.displayName || email.split('@')[0];
  var initials = name.split(/[\s._-]+/).map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
  IS_ADMIN = ADMIN_EMAILS.indexOf(email.toLowerCase()) !== -1;
  document.getElementById('avatar').textContent = initials || '?';
  document.getElementById('who-name').textContent = name + (IS_ADMIN ? ' · Admin' : '');
  document.getElementById('who-email').textContent = email;
  if (IS_ADMIN) {
    var badge = document.createElement('span');
    badge.textContent = 'ADMIN';
    badge.style.cssText = 'margin-left:8px;font-family:IBM Plex Mono,monospace;font-size:.58rem;color:var(--lime);background:var(--lime-soft);border:1px solid rgba(163,230,53,.3);border-radius:5px;padding:2px 6px;vertical-align:2px';
    document.querySelector('.tb-brand').appendChild(badge);
  }
  var mem = document.getElementById('sb-members');
  if (mem) mem.hidden = !IS_ADMIN;
  checkUsername(user);
}

/* One-time username prompt for accounts created before the username system */
function checkUsername(user){
  var db2 = firebase.firestore();
  db2.collection('users').doc(user.uid).get().then(function(doc){
    if (doc.exists && doc.data().username) return;
    var ov = document.getElementById('uname-overlay');
    ov.hidden = false;
    var inp = document.getElementById('uname-input');
    var err = document.getElementById('uname-error');
    inp.focus();
    function fail(msg){ err.textContent = msg; err.hidden = false; }
    function save(){
      err.hidden = true;
      var uname = inp.value.trim().toLowerCase();
      if (!/^[a-z0-9._-]{3,20}$/.test(uname)) { fail('3–20 characters: letters, numbers, dots, dashes, or underscores.'); return; }
      var ref = db2.collection('usernames').doc(uname);
      ref.get().then(function(d){
        if (d.exists && d.data().uid !== user.uid) { fail('That username is already taken — try another.'); return null; }
        return ref.set({ uid: user.uid, email: user.email }).then(function(){
          return db2.collection('users').doc(user.uid).set({ username: uname, email: user.email }, { merge: true });
        }).then(function(){ ov.hidden = true; });
      }).catch(function(){ fail('Couldn’t save right now — try again.'); });
    }
    document.getElementById('uname-save').addEventListener('click', save);
    inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') save(); });
    document.getElementById('uname-skip').addEventListener('click', function(){ ov.hidden = true; });
  }).catch(function(err){ console.warn('username check skipped:', err && err.code); });
}
document.getElementById('signout').addEventListener('click', function(){
  firebase.auth().signOut().then(function(){ window.location.replace('/'); });
});
var av = document.getElementById('avatar'), avMenu = document.getElementById('avatar-menu');
av.addEventListener('click', function(e){ e.stopPropagation(); avMenu.hidden = !avMenu.hidden; });
document.addEventListener('click', function(){ avMenu.hidden = true; });

/* ---------- boards (demo data, monday-style) ---------- */
var PEOPLE = { JC: ['JC', 'var(--lime)'], MA: ['MA', 'var(--blue)'], RD: ['RD', 'var(--amber)'], LS: ['LS', 'var(--red)'], TeamRPM: ['R', 'var(--blue)'] };
var STATUS_CYCLE = ['working', 'done', 'stuck', 'review'];
var STATUS_LABEL = { done: 'Done', working: 'Working on it', stuck: 'Stuck', review: 'For review' };

var BOARDS = {
  dashboard: {
    title: 'Dashboard', desc: 'Everything due across the firm — one glance.',
    groups: [
      { name: 'Due this week', color: 'var(--red)', items: [
        { name: '1601-C — file & pay (14 clients)', chip: '1601-C', p: 'JC', s: 'working', due: 'AUG 10' },
        { name: '0619-E — expanded withholding remittance', chip: '0619-E', p: 'MA', s: 'stuck', due: 'AUG 10' },
        { name: 'SSS/PhilHealth/Pag-IBIG contributions', chip: 'GOVT', p: 'RD', s: 'working', due: 'AUG 11' } ] },
      { name: 'Coming up', color: 'var(--amber)', items: [
        { name: '2550Q — quarterly VAT (9 clients)', chip: '2550Q', p: 'JC', s: 'review', due: 'AUG 25' },
        { name: '1702Q — quarterly income tax', chip: '1702Q', p: 'MA', s: 'working', due: 'AUG 29' } ] },
      { name: 'Done this month', color: 'var(--lime)', items: [
        { name: '1601-C — July batch', chip: '1601-C', p: 'JC', s: 'done', due: 'JUL 10' },
        { name: '2550M — monthly VAT filers', chip: '2550M', p: 'LS', s: 'done', due: 'JUL 20' } ] }
    ]
  },
  tasks: { title: 'Employee Task Monitoring', desc: '', soon: 'This module is being built next — weekly assignments and cluster boards will live here.' },
  tax: { title: 'Tax Compliance System', desc: '', soon: 'This module is being built next — the BIR filing pipeline will live here.' },
  audit: { title: 'Audit', desc: '', soon: 'This module is being built next — engagement stages across clients will live here.' },
  books: { title: 'Bookkeeping', desc: '', soon: 'This module is being built next — monthly closings and bookkeeping runs will live here.' },
  clients: { title: 'Client Masterlist', desc: '', soon: 'This module is being built next — engagement coverage per client will live here.' },
  settings: { title: 'Settings', desc: '', soon: 'Workspace settings — user roles, clusters, and module preferences — arrive with the full build.' },
  members: { title: 'Members', membersView: true }
};

var current = 'dashboard';
var main = document.getElementById('main');

/* ---------- Firestore sync ---------- */
var db = firebase.firestore();
var SYNC_BOARDS = ['dashboard'];
var seeded = {};
var syncStarted = false;

function startSync(){
  if (syncStarted) return;
  syncStarted = true;
  SYNC_BOARDS.forEach(function(key){
    db.collection('boards').doc(key).onSnapshot(function(doc){
      if (doc.exists) {
        var d = doc.data();
        if (d && d.groups) {
          BOARDS[key].groups = d.groups;
          if (current === key && !doc.metadata.hasPendingWrites) render(key);
        }
      } else if (!seeded[key]) {
        // First run ever: seed Firestore with the starter data.
        seeded[key] = true;
        db.collection('boards').doc(key).set({
          title: BOARDS[key].title,
          groups: BOARDS[key].groups
        }).catch(syncError);
      }
    }, syncError);
  });
}
function persist(){
  if (SYNC_BOARDS.indexOf(current) === -1) return;
  db.collection('boards').doc(current).set({
    title: BOARDS[current].title,
    groups: BOARDS[current].groups
  }).catch(syncError);
}
function syncError(err){
  console.error('Firestore sync error:', err);
  var el = document.getElementById('sync-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-error';
    el.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#F87171;font-size:.78rem;padding:9px 16px;border-radius:9px;z-index:60';
    document.body.appendChild(el);
  }
  el.textContent = 'Changes aren’t saving right now — check your connection or contact the administrator.';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.remove(); }, 6000);
}

function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]; }); }

function render(boardKey){
  current = boardKey;
  var b = BOARDS[boardKey];
  document.querySelectorAll('.sb-item[data-board]').forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-board') === boardKey);
  });
  if (b.membersView) { renderMembers(); return; }
  if (b.soon) {
    main.innerHTML = '<div class="board-head"><h1>' + esc(b.title) + '</h1></div>' +
      '<div class="board-tabs"></div><div style="height:20px"></div>' +
      '<div class="soonboard"><b>' + esc(b.title) + ' is coming soon</b>' + esc(b.soon) + '</div>';
    return;
  }
  var html = '<div class="board-head"><h1>' + esc(b.title) + '</h1>' +
    (b.desc ? '<div class="desc">' + esc(b.desc) + '</div>' : '') + '</div>' +
    '<div class="board-tabs"><div class="btab on">Main table</div><div class="btab off">Kanban</div><div class="btab off">Calendar</div></div>' +
    '<div class="toolbar"><button class="tool-new" id="new-item">+ New item</button>' +
    '<div class="tool">🔍 <input id="board-filter" placeholder="Filter items" aria-label="Filter items"></div>' +
    '<div class="tool">👤 Person</div><div class="tool">⇅ Sort</div></div>';

  b.groups.forEach(function(g, gi){
    html += '<div class="group" data-gi="' + gi + '">' +
      '<div class="group-head"><span class="caret">▼</span>' +
      '<span class="group-title" style="color:' + g.color + '">' + esc(g.name) + '</span>' +
      '<span class="group-count">' + g.items.length + ' items</span></div>' +
      '<div class="gtable" style="--gcolor:' + g.color + '">' +
      '<div class="grow head"><div>Item</div><div>Owner</div><div>Status</div><div>Due</div></div>';
    g.items.forEach(function(it, ii){
      var p = PEOPLE[it.p] || [it.p, 'var(--blue)'];
      html += '<div class="grow item" data-name="' + esc((it.name + ' ' + (it.chip || '')).toLowerCase()) + '">' +
        '<div>' + (it.chip ? '<span class="form-chip">' + esc(it.chip) + '</span>' : '') + '<span class="name">' + esc(it.name) + '</span></div>' +
        '<div class="person"><span class="pava" style="background:' + p[1] + '">' + esc(p[0]) + '</span> ' + esc(it.p) + '</div>' +
        '<div><button class="status" data-s="' + it.s + '" data-gi="' + gi + '" data-ii="' + ii + '" title="Click to change status">' + STATUS_LABEL[it.s] + '</button></div>' +
        '<div><span class="due">' + esc(it.due) + '</span></div></div>';
    });
    html += '<div class="addrow" data-gi="' + gi + '">＋ <input placeholder="Add item…" aria-label="Add item to ' + esc(g.name) + '"></div>' +
      '</div></div>';
  });
  main.innerHTML = html;
  wireBoard();
}

function wireBoard(){
  main.querySelectorAll('.group-head').forEach(function(h){
    h.addEventListener('click', function(){ h.parentElement.classList.toggle('closed'); });
  });
  main.querySelectorAll('.status').forEach(function(s){
    s.addEventListener('click', function(){
      var next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(s.getAttribute('data-s')) + 1) % STATUS_CYCLE.length];
      s.setAttribute('data-s', next);
      s.textContent = STATUS_LABEL[next];
      BOARDS[current].groups[+s.getAttribute('data-gi')].items[+s.getAttribute('data-ii')].s = next;
      persist();
    });
  });
  main.querySelectorAll('.addrow input').forEach(function(inp){
    inp.addEventListener('keydown', function(e){
      if (e.key !== 'Enter' || !inp.value.trim()) return;
      var gi = +inp.closest('.addrow').getAttribute('data-gi');
      BOARDS[current].groups[gi].items.push({ name: inp.value.trim(), p: 'JC', s: 'working', due: '—' });
      persist();
      render(current);
    });
  });
  var filter = document.getElementById('board-filter');
  if (filter) filter.addEventListener('input', function(){
    var q = filter.value.toLowerCase();
    main.querySelectorAll('.grow.item').forEach(function(r){
      r.style.display = r.getAttribute('data-name').indexOf(q) !== -1 ? '' : 'none';
    });
  });
  var newBtn = document.getElementById('new-item');
  if (newBtn) newBtn.addEventListener('click', function(){
    var firstAdd = main.querySelector('.addrow input');
    if (firstAdd) firstAdd.focus();
  });
}

/* ---------- Members (admin only) ---------- */
var CLUSTERS = ['RPM', 'VCM', 'ADS', 'INTERN'];
var membersUnsub = null;

function renderMembers(){
  if (!IS_ADMIN) {
    main.innerHTML = '<div class="board-head"><h1>Members</h1></div><div style="height:20px"></div>' +
      '<div class="soonboard"><b>Admins only</b>This page is restricted to the workspace administrator.</div>';
    return;
  }
  main.innerHTML = '<div class="board-head"><h1>Members</h1>' +
    '<div class="desc">Who can create a workspace account, and which cluster they belong to. Only the admin sees this page.</div></div>' +
    '<div style="height:16px"></div>' +
    '<div class="toolbar">' +
    '<input id="mem-email" class="mem-input" type="email" inputmode="email" spellcheck="false" placeholder="staff.email@gmail.com" aria-label="Member email">' +
    '<select id="mem-cluster" class="mem-input" aria-label="Cluster">' + CLUSTERS.map(function(c){ return '<option>' + c + '</option>'; }).join('') + '</select>' +
    '<button class="tool-new" id="mem-add">+ Add member</button></div>' +
    '<div class="mem-error" id="mem-error" role="alert" hidden></div>' +
    '<div class="gtable" style="--gcolor:var(--lime)">' +
    '<div class="grow head"><div>Email</div><div>Cluster</div><div>Added</div><div></div></div>' +
    '<div id="mem-rows"></div></div>';

  document.getElementById('mem-add').addEventListener('click', addMember);
  document.getElementById('mem-email').addEventListener('keydown', function(e){ if (e.key === 'Enter') addMember(); });

  if (membersUnsub) membersUnsub();
  membersUnsub = db.collection('members').onSnapshot(function(snap){
    if (current !== 'members') return;
    var docs = [];
    snap.forEach(function(d){ docs.push(d); });
    docs.sort(function(a, b){ return a.id.localeCompare(b.id); });
    var rows = docs.map(function(d){
      var m = d.data() || {};
      var added = m.addedAt && m.addedAt.toDate ? m.addedAt.toDate().toLocaleDateString() : '—';
      return '<div class="grow item"><div><span class="name">' + esc(d.id) + '</span></div>' +
        '<div><select class="mem-input mem-cluster-sel" data-email="' + esc(d.id) + '" aria-label="Cluster for ' + esc(d.id) + '">' +
        CLUSTERS.map(function(c){ return '<option' + (m.cluster === c ? ' selected' : '') + '>' + c + '</option>'; }).join('') +
        '</select></div>' +
        '<div><span class="due">' + added + '</span></div>' +
        '<div><button class="mem-del" data-email="' + esc(d.id) + '">Remove</button></div></div>';
    }).join('');
    document.getElementById('mem-rows').innerHTML = rows ||
      '<div class="grow item"><div><span class="name" style="color:var(--dim)">No members yet — add the first staff email above.</span></div><div></div><div></div><div></div></div>';
    document.querySelectorAll('.mem-cluster-sel').forEach(function(sel){
      sel.addEventListener('change', function(){
        db.collection('members').doc(sel.getAttribute('data-email')).update({ cluster: sel.value }).catch(syncError);
      });
    });
    document.querySelectorAll('.mem-del').forEach(function(btn){
      btn.addEventListener('click', function(){
        var em = btn.getAttribute('data-email');
        if (confirm('Remove ' + em + '? They will lose workspace access.')) {
          db.collection('members').doc(em).delete().catch(syncError);
        }
      });
    });
  }, syncError);
}

function addMember(){
  var inp = document.getElementById('mem-email');
  var err = document.getElementById('mem-error');
  var email = inp.value.trim().toLowerCase();
  err.hidden = true;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    err.textContent = 'Enter a valid email address.';
    err.hidden = false;
    return;
  }
  db.collection('members').doc(email).set({
    email: email,
    cluster: document.getElementById('mem-cluster').value,
    addedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){ inp.value = ''; inp.focus(); }).catch(syncError);
}

document.querySelectorAll('.sb-item[data-board]').forEach(function(el){
  el.addEventListener('click', function(){
    render(el.getAttribute('data-board'));
    document.getElementById('sidebar').classList.remove('open');
  });
});
document.getElementById('burger').addEventListener('click', function(e){
  e.stopPropagation();
  document.getElementById('sidebar').classList.toggle('open');
});
document.getElementById('global-search').addEventListener('input', function(){
  var bf = document.getElementById('board-filter');
  if (bf) { bf.value = this.value; bf.dispatchEvent(new Event('input')); }
});

render('dashboard');
</script>
